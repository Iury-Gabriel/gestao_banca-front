<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BACBO Bankroll Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div id="toast-container"></div>
    <div class="auth-container">
        <div class="auth-card" id="login-card">
            <h1 class="auth-title">BACBO MANAGER</h1>

            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" class="form-control" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Senha</label>
                    <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary">Entrar</button>
            </form>

            <button class="btn btn-ghost" id="show-register">Não tem uma conta? Cadastre-se</button>
        </div>

        <div class="auth-card hidden" id="register-card">
            <h1 class="auth-title">CADASTRAR</h1>

            <form id="register-form">
                <div class="form-group">
                    <label for="reg-email">E-mail</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Senha</label>
                    <input type="password" id="reg-password" class="form-control" placeholder="Min. 6 caracteres"
                        minlength="6" required>
                </div>
                <div class="form-group">
                    <label for="reg-bankroll">Banca Inicial (R$)</label>
                    <input type="number" id="reg-bankroll" class="form-control" placeholder="Ex: 1000" step="0.01"
                        required>
                </div>
                <button type="submit" class="btn btn-primary">Criar Conta</button>
            </form>

            <button class="btn btn-ghost" id="show-login">Já tem uma conta? Login</button>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>

</html>
